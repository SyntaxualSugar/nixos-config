name: Flake check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  flake:
    runs-on: ubuntu-latest
    permissions:
      id-token: "write"
      contents: "read"
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - uses: DeterminateSystems/flake-checker-action@main

      # Runs formatter (nixpkgs-fmt), linters (statix, deadnix), and
      # evaluates nixosConfigurations for option/type errors — all defined
      # once in flake.nix so this stays in sync with what you can run
      # locally via `nix flake check`.
      - name: Run flake check
        run: nix flake check

