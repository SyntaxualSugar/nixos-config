name: Flake check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  flake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Nix
        run: |
          curl -L https://nixos.org/nix/install | sh
      - name: Run flake check
        run: nix flake check
      - name: Check nixpkgs-fmt
        run: nix run nixpkgs#nixpkgs-fmt -- --check
